databases:
  - name: self-agent-db
    plan: free
    databaseName: self_agent
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: self-agent-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: self-agent-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: PROXY_URL
        value: ""
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: web
    name: self-agent-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: ""
