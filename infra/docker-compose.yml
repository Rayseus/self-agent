services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: self-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: self_agent
    ports:
      - "5432:5432"
    volumes:
      - self-agent-pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  self-agent-pgdata:
